name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.0

      - uses: actions/cache@v4
        with:
          path: |
            node_modules
            .next/cache
          key: deps-${{ runner.os }}-${{ hashFiles('bun.lock') }}-${{ hashFiles('app/**', 'lib/**', 'content/**', 'public/**', 'next.config.mjs') }}
          restore-keys: |
            deps-${{ runner.os }}-${{ hashFiles('bun.lock') }}-
            deps-${{ runner.os }}-

      - run: bun install --frozen-lockfile --ignore-scripts

      - run: bun run build
        env:
          NODE_ENV: production

      - run: touch out/.nojekyll

      - uses: actions/upload-pages-artifact@v3
        with:
          path: out

      - id: deployment
        uses: actions/deploy-pages@v4
